openapi: 3.0.0
info:
  title: ARTEMIS Gateway API
  version: "1.0.1"
  description: |
    APIs exposed by the Gateway for the ARTEMIS domain. The Gateway validates access, control access roles, forwards requests to microservices via mTLS.
      
    **Stage:**
    ![Stage](https://img.shields.io/badge/Development-blue)
    
    **Stage Progress:**
    ![Progress](https://progress-bar.xyz/0/)

servers:
  - url: /api/v1/iot
    description: ARTEMIS API Base Path (recommended).
  - url: /
    description: Root for discovery and administrative endpoints (e.g., /api, /internal).

tags:
  - name: Node Presentation & Registration
    description: |
      Lifecycle of nodes (sensors/actuators): registration, updates, listing and search.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development-blue)
      ![Progress](https://progress-bar.xyz/100/)
  
  - name: Node Heartbeat
    description: |
      Heartbeat ingestion and history.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development-blue)
      ![Progress](https://progress-bar.xyz/100/)

  - name: Data
    description: |
      Data ingestion (scalar, spatial, vector, temporal, multimedia) and querying.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development-blue)
      ![Progress](https://progress-bar.xyz/40/)
  
  - name: Media
    description: |
      Media listing, download, thumbnails, and exports.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development_NOT_started-orange)
      <!-- ![Progress](https://progress-bar.xyz/0/) -->

  - name: Decision Rules
    description: |
      Create, update, list and delete complex rules for automation.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development_NOT_started-orange)
      <!-- ![Progress](https://progress-bar.xyz/0/) -->

  - name: Actuator Commands
    description: | 
      Send manual commands to actuators and read last command.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development_NOT_started-orange)
      <!-- ![Progress](https://progress-bar.xyz/0/) -->

  - name: Enrollment & Device Credentials
    description: |
      Device provisioning using one-time codes and credential management.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development-blue)
      ![Progress](https://progress-bar.xyz/0/)
  
  - name: Discovery
    description: |
      OpenAPI discovery metadata and useful links.
      
      **Implementation state:**
      ![Stage](https://img.shields.io/badge/Development_NOT_started-orange)
      <!-- ![Progress](https://progress-bar.xyz/0/) -->

security:
  - bearerIndigo: [ ]

paths: ###########################################################
  # Node Presentation & Registration
  ###########################################################
  /nodes:
    post:
      tags: [ Node Presentation & Registration ]
      summary: Register a New Node / Create a New Device
      description: "Registers a new sensor/actuator node and creates its entry in the administrative database."
      security: [ { bearerIndigo: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NodeDetailsRequest' }
      responses:
        '201':
          description: "Node successfully registered."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeRegistered' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Node Presentation & Registration ]
      summary: List and filter all Registered Nodes
      description: "Retrieves a list of all nodes registered, with summary information. Supports filtering of nodes by type, room, capabilities, etc."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - name: type
          in: query
          description: "Filter by node type."
          schema:
            type: string
            enum: [ sensor, actuator, hybrid ]
          example: "sensor"
          required: false
        - name: room
          in: query
          description: "Filter by room or installation area."
          schema:
            type: string
          example: "room-1"
          required: false
        - name: status
          in: query
          description: "Filter by node status."
          schema:
            $ref: '#/components/schemas/StatusNodeValue'
          example: "active"
          required: false
      responses:
        '200':
          description: "Search results returned (possibly empty)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items: { $ref: '#/components/schemas/NodeDetails' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}:
    get:
      tags: [ Node Presentation & Registration ]
      summary: Get Node Details
      description: "Returns complete details of a specific node."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Node details successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeDetails' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      tags: [ Node Presentation & Registration ]
      summary: Update Node Information
      description: "Updates information of an existing node (name, location, metadata...)."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: "The reason why the node is being updated"
                  example: "Room change"
                node:
                  $ref: '#/components/schemas/NodeDetailsRequest'
      responses:
        '200':
          description: "Node successfully updated."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NodeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      tags: [ Node Presentation & Registration ]
      summary: Delete a Node
      description: "Removes a sensor/actuator node from the system."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: mqttUnsubscribe
          in: query
          required: true
          description: Unsubscribed from the broker, if topics are not reused (default=true)
          schema:
            type: boolean
            default: true
      responses:
        '204': { description: "Node successfully deleted. No content returned." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }


  /nodes/{nodeId}/registrationHistory:
    get:
      tags: [ Node Presentation & Registration ]
      summary: Get Registration History
      description: "Returns the audit log of a node's registrations and modifications."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Registration history successfully returned."
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items: { $ref: '#/components/schemas/NodeHistory' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  ###########################################################
  # Node Heartbeat
  ###########################################################
  /nodes/heartbeat:
    get:
      tags: [ Node Heartbeat ]
      summary: Get Last Known Heartbeat For All Nodes
      description: "Provides the last known heartbeat for all nodes in scope."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/StatusNodeValue'
        - $ref: '#/components/parameters/BatteryLevelValue'
        - $ref: '#/components/parameters/SignalStrengthValue'
        - $ref: '#/components/parameters/TemperatureValue'
      responses:
        '200':
          description: "Heartbeat list successfully returned."
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Heartbeat'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/heartbeat:
    post:
      tags: [ Node Heartbeat ]
      summary: Submit Heartbeat
      description: "Submits a heartbeat for a specific node via HTTP as an alternative to the MQTT/RabbitMQ ingestion path."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HeartbeatSubmitRequest' }
      responses:
        '201':
          description: "Heartbeat successfully stored."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HeartbeatAck' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Node Heartbeat ]
      summary: Get Last Known Heartbeat
      description: "Returns the timestamp of the last heartbeat signal received from a specific node."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Last heartbeat successfully returned."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Heartbeat' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/heartbeat/history:
    get:
      tags: [ Node Heartbeat ]
      summary: Get Heartbeat History
      description: "Provides the history of heartbeat signals for a specific node."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Heartbeat history successfully returned."
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodeId:
                    type: string
                    example: "node-001"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HeartbeatBasic'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  ###########################################################
  # Data
  ###########################################################
  /nodes/{nodeId}/data:
    parameters:
      - $ref: '#/components/parameters/NodeId'
    get:
      tags: [ Data ]
      operationId: dataGet
      summary: Read operations via a single unified endpoint
      description: |
        - `op=latest` → returns the latest known data for the node (type-agnostic).
        - `op=query&type=...&startTime=...&endTime=...` → returns data filtered by type and time range.
      security:
        - bearerIndigo: [ ]
      parameters:
        - name: op
          in: query
          required: true
          description: Operation selector.
          schema:
            type: string
            enum: [ latest, query ]
        - name: type
          in: query
          required: false
          description: Data type. Required for `op=query`.
          schema:
            type: string
            enum: [ scalar, spatial, multimedia, vector, temporal ]
        - name: sensorId
          in: query
          required: false
          description: Optional sensor discriminator within the same node. Useful when one node exposes multiple sensors of the same data type.
          schema:
            type: string
        - name: startTime
          in: query
          required: false
          description: Start of the time range (only for `op=query`).
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: End of the time range (only for `op=query`).
          schema:
            type: string
            format: date-time
        - name: pageSize
          in: query
          required: false
          description: Page size for `op=query&type=multimedia`.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: cursor
          in: query
          required: false
          description: Pagination cursor for `op=query&type=multimedia`.
          schema:
            type: string
        - name: mime
          in: query
          required: false
          description: MIME filter (e.g., `image/*`, `video/mp4`) for `op=query&type=multimedia`.
          schema:
            type: string
      responses:
        '200':
          description: Successful read response.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LatestData'
                  - $ref: '#/components/schemas/QueryResult'
                  - $ref: '#/components/schemas/DataMediaList'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

    post:
      tags: [ Data ]
      operationId: dataSubmit
      summary: Submit data via a single unified endpoint
      description: |
        Select behavior using the query string:
        - `type=scalar`     → JSON { sensorId?, value, timestamp? }
        - `type=spatial`    → JSON { sensorId?, x, y, z, timestamp? }
        - `type=vector`     → JSON { sensorId?, vector: number[], timestamp? }
        - `type=temporal`   → JSON { sensorId?, series: [{ timestamp, value }, ...] }
        - `type=multimedia` → multipart/form-data with `file` (+ optional `sensorId`)
        
        If `type=multimedia`, the binary must be sent using `multipart/form-data`.
        The Data Service uploads the binary to the internal Media Service and then persists
        a multimedia data event linked to the node.
        Sending JSON with `type=multimedia` or missing `type` yields 400.
        
        Auth: device via mTLS OR user via JWT:
                  - If mTLS is used, nodeId MUST match the device certificate identity.
                  - If JWT is used, user must have permission on the node.
      security:
        - bearerIndigo: [ ]
        - mutualTLS: [ ]
      parameters:
        - name: type
          in: query
          required: true
          description: Data type.
          schema:
            type: string
            enum: [ scalar, spatial, multimedia, vector, temporal ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ScalarIn'
                - $ref: '#/components/schemas/SpatialIn'
                - $ref: '#/components/schemas/VectorIn'
                - $ref: '#/components/schemas/TemporalIn'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MultimediaIn'
      responses:
        '201':
          description: Data created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAck'
              examples:
                createdScalar:
                  summary: Created scalar datapoint
                  value:
                    status: ok
                    id: rec_01JFQ8E6E9ZP5X6N9K2Q8C
                    receivedAt: "2025-09-10T10:15:12Z"
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

    delete:
      tags: [ Data ]
      operationId: dataDelete
      summary: Delete node data by type and time range
      description: |
        Deletes data records for the specified node and type.
        If a time range is provided (startTime/endTime), only records
        whose timestamp falls within the range are deleted.
        If no time range is provided, *all* records of that type for the node are deleted.
        For `type=multimedia` (and `type=all` when multimedia records are involved),
        the service also triggers cleanup on the internal Media Service.
        
        This operation is intended for maintenance / cleanup / GDPR-like use cases
        and should be protected by strict authorization policies.
      security:
        - bearerIndigo: [ ]   # come gli altri endpoint Data
      parameters:
        - name: type
          in: query
          required: true
          description: Data type to delete.
          schema:
            type: string
            enum: [ scalar, spatial, vector, temporal, multimedia, all ]
        - name: startTime
          in: query
          required: false
          description: Start of time range (inclusive).
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: End of time range (exclusive).
          schema:
            type: string
            format: date-time
        - name: dryRun
          in: query
          required: false
          description: |
            If true, no deletion is performed, only the estimated count of records
            that would be deleted is returned.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                    description: "Number of records actually deleted."
                  type:
                    type: string
                    description: "Type of data affected."
                  nodeId:
                    type: string
                  dryRun:
                    type: boolean
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/data/stream:
    get:
      tags: [ Data ]
      summary: Subscribe to Real-Time Data (SSE)
      description: >
        Opens a Server-Sent Events (SSE) stream to receive real-time data updates 
        for the specified node.  
        Internally, the Gateway subscribes to the relevant MQTT topic 
        and forwards messages to the client as SSE events.
      security:
        - bearerIndigo: [ ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: type
          in: query
          required: true
          description: Filter by data type (scalar, spatial, vector, temporal, multimedia).
          schema:
            type: string
            enum: [ scalar, spatial, vector, temporal, multimedia ]
      responses:
        '200':
          description: "SSE stream opened."
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: data
                  id: msg-001
                  data: {"value":22.5,"unit":"°C","timestamp":"2025-09-17T10:10:00Z"}
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  ###########################################################
  # Media
  ###########################################################
  /internal/media:
    post:
      tags: [ Media ]
      summary: Internal - Create media object
      description: |
        Internal endpoint used by the Data Service to create a media object.
        It stores the binary file into MinIO (or equivalent object storage)
        and persists metadata into the `media` collection in MongoDB.
        
        Not exposed to external clients; protected by mTLS and service-to-service auth.
      servers:
        - url: /      # Media Service base path interno (es. http://media-service)
      security: [ ]     # protetto a livello di rete/mTLS, niente bearer pubblico
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: "Media file (photo/video/document)."
                nodeId:
                  type: string
                  description: "ID of the originating node."
                createdAt:
                  type: string
                  format: date-time
                  description: "Optional: timestamp associated to the media; defaults to now."
                labels:
                  type: array
                  items:
                    type: string
                  description: "Optional labels/tags for the media."
                mimeType:
                  type: string
                  description: "Optional override for MIME type; if omitted, inferred."
              required:
                - file
                - nodeId
      responses:
        '201':
          description: "Media created."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '400':
          description: "Invalid input or upload error."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: "Server error during upload or metadata persistence."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    
    delete:
      tags: [ Media ]
      summary: Internal - Bulk delete media by node and time range
      description: |
        Deletes media objects for a given node and optional time range.
        Used by the Data Service when processing DELETE /nodes/{nodeId}/data?type=multimedia.
        
        Not exposed externally.
      servers:
        - url: /
      security: [ ]
      parameters:
        - name: nodeId
          in: query
          required: true
          schema:
            type: string
          description: "Node ID whose media will be deleted."
        - name: startTime
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "Start of time range (inclusive)."
        - name: endTime
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: "End of time range (exclusive)."
      responses:
        '200':
          description: "Bulk deletion summary."
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                  nodeId:
                    type: string
                  startTime:
                    type: string
                    format: date-time
                  endTime:
                    type: string
                    format: date-time
        '400':
          description: "Invalid parameters."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: "Error during bulk deletion."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /internal/media/{mediaId}:
    delete:
      tags: [ Media ]
      summary: Internal - Delete single media object
      description: |
        Internal endpoint used by other services (e.g., Data Service) to delete a single media object.
        It removes both the metadata document from MongoDB and the associated object from MinIO.
        
        Not exposed to external clients; protected by mTLS and service-to-service auth.
      servers:
        - url: /
      security: [ ]
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: "Media deleted."
          content:
            application/json:
              schema:
                type: object
                properties:
                  mediaId:
                    type: string
                  status:
                    type: string
                    example: "deleted"
        '404':
          description: "Media not found."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: "Delete error (metadata or storage)."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              
  /media/{mediaId}/download:
    servers:
      - url: /api/v1
    get:
      tags: [ Media ]
      operationId: mediaDownloadBinary
      security: [ { bearerIndigo: [ ] } ]
      summary: Download a media file (photo/video)
      description: >
        Serves the full binary file. Supports HTTP Range requests for resumable downloads.
        Use Content-Disposition for filename if desired.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Full file.
          headers:
            Content-Length: { schema: { type: string } }
            Content-Type: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            application/octet-stream: { }
        '206':
          description: Partial content (Range).
          headers:
            Content-Range: { schema: { type: string } }
            Content-Length: { schema: { type: string } }
            Content-Type: { schema: { type: string } }
            ETag: { schema: { type: string } }
          content:
            application/octet-stream: { }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /media:
    get:
      tags: [ Media ]
      operationId: mediaList
      security: [ { bearerIndigo: [ ] } ]
      summary: List media metadata
      description: >
        Returns a paged list of media metadata already associated with node data events.
        This endpoint is read-only; multimedia upload must go through
        `POST /nodes/{nodeId}/data?type=multimedia`.
      parameters:
        - name: nodeId
          in: query
          required: false
          schema: { type: string }
        - name: contentType
          in: query
          required: false
          schema: { type: string }
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
        - name: size
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1 }
      responses:
        '200':
          description: Media metadata page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaList'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /media/{mediaId}:
    servers:
      - url: /api/v1
    head:
      tags: [ Media ]
      operationId: mediaHead
      security: [ { bearerIndigo: [ ] } ]
      summary: Quick metadata via headers
      description: "Returns headers like Content-Length, Content-Type, ETag, Last-Modified."
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200': { description: "Headers contain metadata." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    get:
      tags: [ Media ]
      operationId: mediaDownload
      security: [ { bearerIndigo: [ ] } ]
      summary: Presigned URL a media file (photo/video)
      description: >
        Serves a presigned URL to the full binary file.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: presigned URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaObject'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /media/{mediaId}/thumbnail:
    servers:
      - url: /api/v1
    get:
      tags: [ Media ]
      operationId: mediaThumbnail
      security: [ { bearerIndigo: [ ] } ]
      summary: Retrieve a media thumbnail
      description: "Returns a small thumbnail rendition for quick previews."
      parameters:
        - $ref: '#/components/parameters/MediaId'
        - name: maxW
          in: query
          schema: { type: integer, default: 512, minimum: 1 }
          description: Max width in pixels.
        - name: maxH
          in: query
          schema: { type: integer, default: 512, minimum: 1 }
          description: Max height in pixels.
      responses:
        '200':
          description: Thumbnail image.
          content:
            image/jpeg: { }
            image/png: { }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }


  /media/exports:
    post:
      tags: [ Media ]
      operationId: mediaExportCreate
      security: [ { bearerIndigo: [ ] } ]
      summary: Create a bulk media export job (ZIP/TAR)
      description: >
        Creates an asynchronous export over a filtered media set (no streaming).
        The response returns an exportId that can be polled for status and a download link when ready.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaExportRequest'
      responses:
        '202':
          description: Export job created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaExportStatus'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }

  /media/exports/{exportId}:
    get:
      tags: [ Media ]
      operationId: mediaExportGet
      security: [ { bearerIndigo: [ ] } ]
      summary: Get export job status and download URL
      description: >
        Returns the status of a previously created export job and, if completed,
        a short-lived pre-signed URL to download the archive.
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Export status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaExportStatus'
              examples:
                doneZip:
                  summary: Completed export
                  value:
                    exportId: "ex_01JFQA6V7F3S9DNQ4C5"
                    status: "done"
                    downloadUrl: "https://signed.example.com/export/ex_01JFQA6V7F3S9DNQ4C5.zip"
                running:
                  summary: In progress
                  value:
                    exportId: "ex_01JFQA6V7F3S9DNQ4C5"
                    status: "running"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }


  ###########################################################
  # Decision Rules
  ###########################################################
  /decision-rules:
    post:
      tags: [ Decision Rules ]
      summary: Define a Decision Rule
      description: "Defines a new rule to automate actuator actions based on sensor data."
      security: [ { bearerIndigo: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRuleRequest'
      responses:
        '200':
          description: "Rule successfully defined."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAck'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Decision Rules ]
      summary: Get All Decision Rules
      description: "Lists all decision rules defined for the current scope."
      security: [ { bearerIndigo: [ ] } ]
      responses:
        '200':
          description: "List of rules successfully returned."
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/DecisionRule'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /decision-rules/{ruleId}:
    get:
      tags: [ Decision Rules ]
      summary: Get Rule by ID
      description: "Returns the details of a specific decision rule by its ID."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: "Rule successfully returned."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionRule'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      tags: [ Decision Rules ]
      summary: Update a Decision Rule
      description: "Modifies an existing decision rule."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRule'
      responses:
        '200':
          description: "Rule successfully updated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAck'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      tags: [ Decision Rules ]
      summary: Delete a Decision Rule
      description: "Removes a decision rule from the system."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '204': { description: "Rule successfully deleted." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  ###########################################################
  # Actuator Commands
  ###########################################################
  /nodes/{nodeId}/commands:
    post:
      tags: [ Actuator Commands ]
      summary: Send Manual Command to Actuator
      description: "Sends an immediate manual command to an actuator (e.g., 'on', 'off', 'setValue')."
      security: [ { bearerIndigo: [ ] } ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandsRequest'
      responses:
        '200':
          description: "Command successfully sent."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commands'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [ Actuator Commands ]
      summary: Get Last Command
      description: "Returns the last command that was sent to a specific actuator."
      security: 
        - bearerIndigo: [ ]
        - mutualTLS: [ ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "Last command successfully returned."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commands'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /nodes/{nodeId}/commands/stream:
    get:
      tags: [ Actuator Commands ]
      summary: Subscribe to command events for a node (SSE)
      description: Opens an SSE stream with command events sent to the specified node.
      security:
        - bearerIndigo: [ ]
      parameters:
        - $ref: '#/components/parameters/NodeId'
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: pollMs
          in: query
          required: false
          schema:
            type: integer
            default: 1000
            minimum: 250
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: node-command
                  id: 67e0...
                  data: {"nodeId":"node-001","commandType":"on","issuedBy":"owner-a","timestamp":"2026-03-23T10:00:00Z"}
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }


  ###########################################################
  # Enrollment & Device Credentials
  ###########################################################
  /credentials/enroll/code:
    servers:
      - url: /api/v1
    post:
      tags: [ Enrollment & Device Credentials ]
      summary: Create one-time enrollment code for a node or a list of nodes
      description: >
        Generates a one-time pairing code (short TTL) to bootstrap a device in the field.
      security: [ { bearerIndigo: [ ] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsEnrollmentCreateRequest'

      responses:
        '201':
          description: Enrollment code(s) created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsEnrollmentCreateResponse'
  
        '400':
          description: Invalid request (e.g., nodesId empty, ttlSeconds out of range).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidPayload:
                  summary: Invalid nodesId list
                  value:
                    type: "urn:artemis:error:validation"
                    title: "Validation error"
                    status: 400
                    detail: "nodesId must contain at least 1 item and at most 100 items."
                    errorCode: "VALIDATION_ERROR"
                    correlationId: "0102030405060708"
  
        '401':
          description: Missing or invalid JWT.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    type: "urn:artemis:error:auth:unauthorized"
                    title: "Unauthorized"
                    status: 401
                    detail: "Authentication is required."
                    errorCode: "AUTH_UNAUTHORIZED"
                    correlationId: "1111222233334444"
  
        '403':
          description: Authenticated but not allowed (e.g., user lacks permission to enroll for node(s)).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  summary: Forbidden
                  value:
                    type: "urn:artemis:error:auth:forbidden"
                    title: "Forbidden"
                    status: 403
                    detail: "You do not have permission to create enrollments for one or more nodes."
                    errorCode: "AUTH_FORBIDDEN"
                    correlationId: "5555666677778888"
  
        '409':
          description: Conflict (e.g., enrollment already exists and replaceOld=false).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                enrollmentExists:
                  summary: Enrollment already exists
                  value:
                    type: "urn:artemis:error:credentials:enrollment-exists"
                    title: "Enrollment already exists"
                    status: 409
                    detail: "An active enrollment already exists for one or more nodes."
                    errorCode: "CREDENTIALS_ENROLLMENT_EXISTS"
                    correlationId: "9999aaaabbbbcccc"

  /credentials/enroll:
    servers:
      - url: /api/v1
    post:
      tags: [ Enrollment & Device Credentials ]
      summary: Device certificate enrollment (code + CSR)
      description: Public endpoint protected by one-time enrollmentCode.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsEnrollRequest'
      responses:
        '201':
          description: Certificate issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsCertificateResponse'
  
        '400':
          description: Invalid request (e.g., malformed CSR, missing fields).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidCsr:
                  summary: CSR is not valid PEM/PKCS#10
                  value:
                    type: "urn:artemis:error:credentials:invalid-csr"
                    title: "Invalid CSR"
                    status: 400
                    detail: "csrPem is not a valid PKCS#10 CSR in PEM format."
                    errorCode: "CREDENTIALS_INVALID_CSR"
                    correlationId: "c2f6b1b0c1a44b4c"
                    nodeId: "node-001"
  
        '403':
          description: Enrollment code is invalid for this node, expired, or already used.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                codeExpired:
                  summary: Enrollment code expired
                  value:
                    type: "urn:artemis:error:credentials:enrollment-expired"
                    title: "Enrollment expired"
                    status: 403
                    detail: "The enrollmentCode has expired."
                    errorCode: "CREDENTIALS_ENROLLMENT_EXPIRED"
                    correlationId: "8f3b9a2d4c1a4d11"
                    nodeId: "node-001"
                    enrollmentId: "enr_2f5c8c0b"
                codeWrongNode:
                  summary: Code not valid for this node
                  value:
                    type: "urn:artemis:error:credentials:enrollment-node-mismatch"
                    title: "Enrollment not allowed for node"
                    status: 403
                    detail: "The enrollmentCode is not valid for the specified nodeId."
                    errorCode: "CREDENTIALS_ENROLLMENT_NODE_MISMATCH"
                    correlationId: "1b2c3d4e5f6a7788"
                    nodeId: "node-002"
                    enrollmentId: "enr_2f5c8c0b"
                codeUsed:
                  summary: Code already used
                  value:
                    type: "urn:artemis:error:credentials:enrollment-used"
                    title: "Enrollment already used"
                    status: 403
                    detail: "The enrollmentCode has already been used."
                    errorCode: "CREDENTIALS_ENROLLMENT_USED"
                    correlationId: "a0b1c2d3e4f50607"
                    nodeId: "node-001"
                    enrollmentId: "enr_2f5c8c0b"
  
        '409':
          description: Conflict (e.g., certificate already exists and replaceOld=false).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                certAlreadyExists:
                  summary: Node already has a valid certificate
                  value:
                    type: "urn:artemis:error:credentials:certificate-exists"
                    title: "Certificate already exists"
                    status: 409
                    detail: "A valid certificate already exists for this nodeId."
                    errorCode: "CREDENTIALS_CERT_ALREADY_EXISTS"
                    correlationId: "f1e2d3c4b5a69788"
                    nodeId: "node-001"

  /credentials/renew:
    servers: [ { url: /api/v1 } ]
    post:
      tags: [ Enrollment & Device Credentials ]
      summary: Renew device certificate
      description: |
        Transitional profile: renewal is currently exposed without strict mTLS enforcement.
        Internal mTLS hardening may be enabled in a future version.
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsRenewRequest'
      responses:
        '201':
          description: New certificate issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsCertificateResponse'
  
        '400':
          description: Invalid request (e.g., malformed CSR).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalidCsr:
                  summary: CSR is not valid PEM/PKCS#10
                  value:
                    type: "urn:artemis:error:credentials:invalid-csr"
                    title: "Invalid CSR"
                    status: 400
                    detail: "csrPem is not a valid PKCS#10 CSR in PEM format."
                    errorCode: "CREDENTIALS_INVALID_CSR"
                    correlationId: "d3f0a1b2c3d4e5f6"
  
        '401':
          description: Missing or invalid authentication context.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                unauthorized:
                  summary: Unauthorized
                  value:
                    type: "urn:artemis:error:auth:unauthorized"
                    title: "Unauthorized"
                    status: 401
                    detail: "Authentication is required."
                    errorCode: "AUTH_UNAUTHORIZED"
                    correlationId: "0a1b2c3d4e5f6071"
  
        '403':
          description: Authenticated but not allowed (e.g., certificate identity not mapped to a node).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                unknownDeviceIdentity:
                  summary: Certificate identity not recognized
                  value:
                    type: "urn:artemis:error:auth:unknown-device"
                    title: "Unknown device identity"
                    status: 403
                    detail: "The client certificate identity is not associated with any registered node."
                    errorCode: "AUTH_UNKNOWN_DEVICE"
                    correlationId: "1122334455667788"
  
        '409':
          description: Conflict (e.g., renewal not allowed yet, grace window, policy violation).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                renewalNotAllowedYet:
                  summary: Renewal too early
                  value:
                    type: "urn:artemis:error:credentials:renewal-too-early"
                    title: "Renewal not allowed yet"
                    status: 409
                    detail: "Renewal is not allowed yet for this node. Try later."
                    errorCode: "CREDENTIALS_RENEWAL_TOO_EARLY"
                    correlationId: "99aabbccddeeff00"
  
        '429':
          description: Too many requests (rate limited).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                rateLimited:
                  summary: Rate limit exceeded
                  value:
                    type: "urn:artemis:error:rate-limit"
                    title: "Too many requests"
                    status: 429
                    detail: "Too many renewal attempts. Please retry later."
                    errorCode: "RATE_LIMITED"
                    correlationId: "aa00bb11cc22dd33"
  ###########################################################
  # Discovery
  ###########################################################
  /api:
    servers:
      - url: /
    get:
      tags: [ Discovery ]
      operationId: getApiDiscovery
      summary: API Discovery document
      description: |
        Discovery document with metadata, versions, and useful links.
        Intended for UI, SDK, and automatic integrations.
      security: [ ]   # public
      responses:
        '200':
          description: Discovery document.
          headers:
            Cache-Control:
              schema: { type: string }
              example: "public, max-age=300"
            ETag:
              schema: { type: string }
            Last-Modified:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryDocument'
              examples:
                default:
                  value:
                    name: "ARTEMIS Platform API"
                    description: "API for managing digital twins, nodes, and IoT data."
                    status: "active"
                    versions:
                      - version: "v1"
                        status: "current"
                        path: "/api/v1/iot"
                      - version: "v2"
                        status: "future"
                        path: "/api/v2/iot"
                    links:
                      self: { href: "/api" }
                      v1: { href: "/api/v1/iot" }
                      nodes: { href: "/api/v1/iot/nodes" }
                      credentials: { href: "/api/v1/iot/credentials/enroll/code" }
components: ###########################################################
  # Security Schemes
  ###########################################################
  securitySchemes:
    bearerIndigo:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "OIDC access token issued by INDIGO identity service. Used by applications and users."
    mutualTLS:
      type: http
      scheme: bearer
      description: >
        Auth: device via mTLS OR user via JWT.
        If mTLS is used, nodeId MUST match the device certificate identity.
        If JWT is used, user must have permission on the node.
  

  ###########################################################
  # Parameters
  ###########################################################
  parameters:
    NodeId:
      name: nodeId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the node (sensor or actuator)."
    LinkId:
      name: linkId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the link between a sensor and an actuator."
    RuleId:
      name: ruleId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the decision rule."
    KeyId:
      name: keyId
      in: path
      required: true
      schema: { type: string }
      description: "Unique ID of the API key."
    MediaId:
      name: mediaId
      in: path
      required: true
      description: Unique media identifier.
      schema: { type: string }
    ExportId:
      name: exportId
      in: path
      required: true
      description: Media export job identifier.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Optional idempotency key for POST submissions to avoid duplicated records on retries.
      schema: { type: string }
    StatusNodeValue:
      name: status
      in: query
      required: false
      schema: { $ref: '#/components/schemas/StatusNodeValue' }
    BatteryLevelValue:
      name: batteryLevel
      in: query
      required: false
      schema:
        type: string
        example: "0-20"
    SignalStrengthValue:
      name: signalStrength
      in: query
      required: false
      schema:
        type: string
        example: "60-80"
    TemperatureValue:
      name: temperature
      in: query
      required: false
      schema:
        type: string
        example: "20-30"


  ###########################################################
  # Schemas
  ###########################################################
  schemas:
    StatusNodeValue:
      type: string
      enum: [ active, inactive, standby ]

    Timestamp:
      type: string
      format: date-time
      example: "2025-09-10T10:15:12Z"

    NodeCapabilities:
      type: object
      properties:
        sensors:
          type: array
          items:
            type: object
            properties:
              sensorId:
                type: string
                description: Stable identifier of the sensor within the node. Required to distinguish multiple sensors sharing the same nodeId and dataType.
              name: { type: string }
              type: { type: string }
              dataType: { type: string, enum: [ scalar, vector, spatial, multimedia, temporal ] }
              unit: { type: string }
              range:
                type: array
                minItems: 2
                maxItems: 2
                items: { type: number }
        actuators:
          type: array
          items: { type: object }
        supportedDataTypes:
          type: array
          items:
            type: string
            enum: [ scalar, vector, spatial, multimedia, temporal ]
        mqttTopics:
          type: object
          properties:
            publish:
              type: array
              items: { type: string }
            subscribe:
              type: array
              items: { type: string }

    NodeOperationalFlags:
      type: object
      properties:
        isCalibrated:
          type: boolean
          default: true
        maintenanceRequired:
          type: boolean
          default: false

    NodeDetails:
      type: object
      required: [ nodeId, name, type, capabilities, status, enabled, simulatedNode ]
      properties:
        nodeId: { type: string, description: "Unique ID of the node." }
        name: { type: string, description: "Descriptive name of the node." }
        type: { type: string, enum: [ sensor, actuator, hybrid ], description: "Type of node." }
        location:
          type: object
          description: "Location data of the node."
          required: [ indoor, installationPoint ]
          properties:
            latitude: { type: number }
            longitude: { type: number }
            altitude: { type: number }
            position:
              type: object
              properties:
                floor: { type: integer }
                room: { type: string }
                x: { type: integer }
                y: { type: integer }
                z: { type: integer }
            indoor: { type: boolean }
            installationPoint: { type: string }
        capabilities: { $ref: '#/components/schemas/NodeCapabilities' }
        rhdtId:
          type: string
          example: "rhdt-001"
        status:
          $ref: '#/components/schemas/StatusNodeValue'
        enabled: { type: boolean }
        simulatedNode: { type: boolean }
        manufacturer: { type: string }
        firmwareVersion: { type: string }
        installationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        registrationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        operationalFlags: { $ref: '#/components/schemas/NodeOperationalFlags' }
        additionalProp: { type: object }

    NodeDetailsRequest:
      type: object
      required: [ name, type, capabilities, status, enabled, simulatedNode ]
      properties:
        name: { type: string, description: "Descriptive name of the node." }
        type: { type: string, enum: [ sensor, actuator, hybrid ], description: "Type of node." }
        location:
          type: object
          description: "Location data of the node."
          required: [ indoor, installationPoint ]
          properties:
            latitude: { type: number }
            longitude: { type: number }
            altitude: { type: number }
            position:
              type: object
              properties:
                floor: { type: integer }
                room: { type: string }
                x: { type: integer }
                y: { type: integer }
                z: { type: integer }
            indoor: { type: boolean }
            installationPoint: { type: string }
        capabilities: { $ref: '#/components/schemas/NodeCapabilities' }
        rhdtId:
          type: string
          example: "rhdt-001"
        status:
          $ref: '#/components/schemas/StatusNodeValue'
        enabled: { type: boolean }
        simulatedNode: { type: boolean }
        manufacturer: { type: string }
        firmwareVersion: { type: string }
        installationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        registrationTimestamp: { $ref: '#/components/schemas/Timestamp' }
        operationalFlags: { $ref: '#/components/schemas/NodeOperationalFlags' }
        additionalProp: { type: object }


    NodeResponse:
      type: object
      properties:
        nodeId: { type: string }
        message: { type: string }


    NodeRegistered:
      type: object
      properties:
        nodeId: { type: string }
        message: { type: string }
        assignedTopics:
          type: object
          properties:
            publish:
              type: array
              items: { type: string }
            subscribe:
              type: array
              items: { type: string }

    NodeHistory:
      type: object
      properties:
        timestamp: { $ref: '#/components/schemas/Timestamp' }
        event: { type: string }
        changedBy: { type: string }
        details:
          type: array
          items: { type: string }

    Heartbeat:
      type: object
      properties:
        nodeId: { type: string }
        rhdtId: { type: string }
        timestamp: { $ref: '#/components/schemas/Timestamp' }
        status: { $ref: '#/components/schemas/StatusNodeValue' }
        batteryLevel: { type: integer }
        signalStrength: { type: integer }
        temperature: { type: number }

    HeartbeatBasic:
      type: object
      properties:
        timestamp: { $ref: '#/components/schemas/Timestamp' }
        status: { $ref: '#/components/schemas/StatusNodeValue' }
        batteryLevel: { type: integer }
        signalStrength: { type: integer }
        temperature: { type: number }

    HeartbeatSubmitRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/StatusNodeValue' }
        batteryLevel: { type: integer }
        signalStrength: { type: integer }
        temperature: { type: number }
        timestamp: { $ref: '#/components/schemas/Timestamp' }
      required: [ status ]

    HeartbeatAck:
      type: object
      properties:
        status: { type: string, example: "ok" }
        id: { type: string, description: "Internal heartbeat record ID" }
        receivedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [ status, id, receivedAt ]
      example:
        status: ok
        id: hb_01JFQ8E6E9ZP5X6N9K2Q8C
        receivedAt: "2026-04-09T12:00:00Z"

    DataAck:
      type: object
      properties:
        status: { type: string, example: "ok" }
        id: { type: string, description: "Internal record ID" }
        receivedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [ status, id, receivedAt ]
      example:
        status: ok
        id: rec_01JFQ8E6E9ZP5X6N9K2Q8C
        receivedAt: "2025-09-10T10:15:12Z"

    ScalarIn:
      type: object
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        value: { type: number, description: "Numeric value" }
        timestamp:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: "Optional measurement timestamp; if omitted in MQTT ingestion, the platform may use ingestion time."
      required: [ value ]

    SpatialIn:
      type: object
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        x: { type: number }
        y: { type: number }
        z: { type: number }
        timestamp:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: "Optional measurement timestamp; if omitted in MQTT ingestion, the platform may use ingestion time."
      required: [ x, y, z ]

    VectorIn:
      type: object
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        vector:
          type: array
          items: { type: number }
        timestamp:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: "Optional measurement timestamp; if omitted in MQTT ingestion, the platform may use ingestion time."
      required: [ vector ]

    TemporalIn:
      type: object
      properties:
        sensorId: { type: string, description: "Optional sensor discriminator within the node" }
        series:
          type: array
          items:
            type: object
            properties:
              timestamp: { $ref: '#/components/schemas/Timestamp' }
              value: { type: number }
            required: [ timestamp, value ]
      required: [ series ]

    MultimediaIn:
      type: object
      properties:
        sensorId:
          type: string
          description: Optional sensor discriminator within the node
        file:
          type: string
          format: binary
          description: Media file (photo/video)

    LatestData:
      type: object
      description: Latest datapoint wrapper returned by the data-service.
      properties:
        payload:
          type: object
          additionalProperties: true
      required: [ payload ]
      example:
        payload:
          value: 23.4
          sensorId: "temp-1"
          timestamp: "2026-03-26T10:15:30Z"
          _type: "scalar"
          _receivedAt: "2026-03-26T10:15:31Z"

    QueryResult:
      type: object
      description: Query results for non-media types.
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              nodeId: { type: string }
              type: { type: string }
              receivedAt: { $ref: '#/components/schemas/Timestamp' }
              payload:
                type: object
                additionalProperties: true
            required: [ id, nodeId, type, receivedAt, payload ]
      required: [ data ]
      example:
        data:
          - id: "rec_01JFQ8E6E9ZP5X6N9K2Q8C"
            nodeId: "node-001"
            type: "scalar"
            receivedAt: "2026-03-26T10:15:31Z"
            payload:
              value: 22.9
              sensorId: "temp-1"
              timestamp: "2026-03-26T10:15:30Z"
          - id: "rec_01JFQ8E6E9ZP5X6N9K2Q8D"
            nodeId: "node-001"
            type: "scalar"
            receivedAt: "2026-03-26T10:16:31Z"
            payload:
              value: 23.1
              sensorId: "temp-1"
              timestamp: "2026-03-26T10:16:30Z"

    DataMediaLinks:
      type: object
      properties:
        downloadUrl: { type: string, example: "/media/m_01JFQ9Y2T5K9X3" }
        thumbnailUrl: { type: string, nullable: true, example: "/media/thumb_01JFQ9Y2T5K9X3" }

    DataMediaObject:
      type: object
      properties:
        id: { type: string }
        nodeId: { type: string }
        fileName: { type: string }
        mimeType: { type: string, nullable: true }
        size: { type: integer, format: int64, nullable: true }
        checksum: { type: string, nullable: true }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        duration: { type: number, nullable: true }
        labels:
          type: array
          items: { type: string }
        links:
          $ref: '#/components/schemas/DataMediaLinks'
        thumbnail:
          type: string
          nullable: true
      required: [ id, nodeId, fileName, createdAt, labels, links ]

    DataMediaPageInfo:
      type: object
      properties:
        hasNextPage: { type: boolean }
        nextCursor: { type: string, nullable: true }
      required: [ hasNextPage ]

    DataMediaList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DataMediaObject' }
        pageInfo:
          $ref: '#/components/schemas/DataMediaPageInfo'
      required: [ items, pageInfo ]
      example:
        items:
          - id: "m_01JFQ9Y2T5K9X3"
            nodeId: "abc123"
            fileName: "photo_2025-09-10_10-00-00.jpg"
            mimeType: "image/jpeg"
            size: 2459136
            createdAt: "2025-09-10T10:00:00Z"
            width: 320
            height: 213
            labels: []
            links:
              downloadUrl: "/media/m_01JFQ9Y2T5K9X3"
              thumbnailUrl: "/media/thumb_01JFQ9Y2T5K9X3"
            thumbnail: "thumb_01JFQ9Y2T5K9X3"
        pageInfo:
          hasNextPage: true
          nextCursor: "2025-09-10T10:10:00Z"

    MediaObject:
      type: object
      properties:
        id: { type: string }
        nodeId: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        size: { type: integer, format: int64 }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        width: { type: integer, description: "Pixels (if image/video has dimensions)" }
        height: { type: integer, description: "Pixels" }
        links:
          type: object
          properties:
            downloadUrl: { type: string }
            thumbnailUrl: { type: string }
      required: [ id, nodeId, fileName, mimeType, size, createdAt ]

    MediaList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/MediaObject' }
        page:
          type: integer
        size:
          type: integer
      required: [ data, page, size ]
      example:
        data:
          - id: "m_01JFQ9Y2T5K9X3"
            nodeId: "abc123"
            fileName: "photo_2025-09-10_10-00-00.jpg"
            mimeType: "image/jpeg"
            size: 2459136
            createdAt: "2025-09-10T10:00:00Z"
            width: 4032
            height: 3024
            links:
              downloadUrl: "https://signed.example.com/dl/m_01JFQ9Y2T5K9X3"
              thumbnailUrl: "/media/m_01JFQ9Y2T5K9X3/thumbnail"
          - id: "m_01JFQ9Z7R1PMBW"
            nodeId: "abc123"
            fileName: "video_2025-09-10_10-05-00.mp4"
            mimeType: "video/mp4"
            size: 15039136
            createdAt: "2025-09-10T10:05:00Z"
            width: 1920
            height: 1080
            links:
              downloadUrl: "https://signed.example.com/dl/m_01JFQ9Z7R1PMBW"
              thumbnailUrl: "/media/m_01JFQ9Z7R1PMBW/thumbnail"
        page: 0
        size: 50

    MediaUploadResponse:
      type: object
      properties:
        uploaded: { type: boolean }
        mediaId: { type: string }
        nodeId: { type: string, nullable: true }
        fileName: { type: string }
        mimeType: { type: string }
        filename: { type: string }
        size: { type: integer, format: int64 }
        contentType: { type: string }
        bucket: { type: string }
        etag: { type: string }
        thumbnailMediaId: { type: string, nullable: true }
        thumbnailContentType: { type: string, nullable: true }
        thumbnailSize: { type: integer, format: int64, nullable: true }
        thumbnailWidth: { type: integer, nullable: true }
        thumbnailHeight: { type: integer, nullable: true }
      required: [ uploaded, mediaId, fileName, mimeType, filename, size, contentType, bucket, etag ]

    MediaExportRequest:
      type: object
      properties:
        nodeId: { type: string, example: "node-001" }
        startTime: { $ref: '#/components/schemas/Timestamp' }
        endTime: { $ref: '#/components/schemas/Timestamp' }
        mime: { type: string, example: "image/*" }
        format:
          type: string
          description: Archive format.
          enum: [ zip, tar ]
          default: zip
      additionalProperties: false

    MediaExportStatus:
      type: object
      properties:
        exportId: { type: string }
        status:
          type: string
          enum: [ pending, running, done, error ]
        downloadUrl:
          type: string
          description: "Pre-signed URL. Present only when status=done."
        error:
          type: string
          description: "Error message when status=error."
      required: [ exportId, status ]
      example:
        exportId: "ex_01JFQA6V7F3S9DNQ4C5"
        status: "done"
        downloadUrl: "https://signed.example.com/export/ex_01JFQA6V7F3S9DNQ4C5.zip"
    
    CommandsActions:
      type: array
      description: "Actions to perform when the rule's condition is true."
      items:
        type: object
        properties:
          actuatorId: { type: string, description: "The ID of the actuator to control." }
          command:
            $ref: '#/components/schemas/CommandType'
          value: { type: number, description: "The value to be set between 0 and 100 (only if command is setValue).", example: 50.0 }
      example:
        - actuatorId: "actuator-thermostat-001"
          command: "on"
        - actuatorId: "actuator-light-002"
          command: "setValue"
          value: 60.0

    DecisionRuleEvaluationMethod:
      type: string
      enum: [ expression, externalService, undefined ]
    
    DecisionRule:
      type: object
      properties:
        ruleId:
          type: string
          example: "rule-0001"
        description: { type: string, description: "Brief description of the rule." }
        evaluationMethod:
          $ref: '#/components/schemas/DecisionRuleEvaluationMethod'
        expression:
          type: string
          description: "Logical condition that triggers the rule."
          example: "(H1 + H2)/2 > 60 && T1 < 22"
        externalServiceUrl: { type: string, description: "External service URL that triggers the rule." }
        variables:
          type: object
          description: "Map of variable alias to actual sensor IDs."
          example:
            H1: "sensor-humidity-001"
            H2: "sensor-humidity-002"
            T1: "sensor-temperature-001"
        actions:
          $ref: '#/components/schemas/CommandsActions'

    DecisionRuleRequest:
      type: object
      properties:
        description: { type: string, description: "Brief description of the rule." }
        evaluationMethod:
          $ref: '#/components/schemas/DecisionRuleEvaluationMethod'
        expression:
          type: object
          description: "Logical condition that triggers the rule."
          example: "(H1 + H2)/2 > 60 && T1 < 22"
        externalServiceUrl: { type: string, description: "External service URL that triggers the rule." }
        variables:
          type: object
          description: "Map of variable alias to actual sensor IDs."
          example:
            H1: "sensor-humidity-001"
            H2: "sensor-humidity-002"
            T1: "sensor-temperature-001"
        actions:
          $ref: '#/components/schemas/CommandsActions'
    
    CommandType:
      type: string
      description: "The command to be executed."
      enum: [ on, off, setValue ]

    Commands:
      type: object
      properties:
        issuedBy:
          type: string
          example: "user-0001"
        commandType:
          $ref: '#/components/schemas/CommandType'
        value:
          type: number
          description: Only used if commandType is setValue
          example: 75
        unit:
          type: string
          example: "%"
        reason:
          type: string
          example: "Partial activation due to ventilation regulation"
        message:
          type: string
          example: "Command delivered"
        timestamp:
          $ref: '#/components/schemas/Timestamp'

    CommandsRequest:
      type: object
      properties:
        commandType:
          type: string
          description: "The command to be executed."
          enum: [ on, off, setValue ]
        value:
          type: number
          example: 75
        unit:
          type: string
          example: "%"
        reason:
          type: string
          example: "Partial activation due to ventilation regulation"
        timestamp:
          $ref: '#/components/schemas/Timestamp'

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'

    DiscoveryLink:
      type: object
      required: [ href ]
      properties:
        href:
          type: string
          description: "Relative or absolute URL."

    DiscoveryVersion:
      type: object
      required: [ version, status, path ]
      properties:
        version:
          type: string
          example: "v1"
        status:
          type: string
          description: "Version status."
          enum: [ current, future, beta, deprecated ]
          example: current
        path:
          type: string
          example: "/api/v1"

    DiscoveryDocument:
      type: object
      required: [ name, description, status, versions, links ]
      properties:
        name:
          type: string
          example: "ARTEMIS Platform API"
        description:
          type: string
          example: "API for managing digital twins, nodes, and IoT data."
        status:
          type: string
          description: "Overall platform status."
          enum: [ active, maintenance, deprecated ]
          example: active
        versions:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryVersion'
        links:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DiscoveryLink'

    CredentialsEnrollmentCreateRequest:
      type: object
      required: [ nodesId ]
      properties:
        ttlSeconds:
          type: integer
          format: int32
          default: 1800
          minimum: 60
          maximum: 10800
          description: |
                    Code validity (default 30 min).
                    Max duration is 3 hours.
        replaceOld:
          type: boolean
          default: true
        graceSeconds:
          type: integer
          format: int32
          default: 0
          minimum: 0
        nodesId:
          type: array
          description: "List of nodeId for which a enrollment code (for each nodeId) is requested, max 100 nodes per request"
          maxItems: 100
          items:
            type: string
            example:
              - "node-001"
              - "node-002"
              - "node-003"

    CredentialsEnrollmentCreateResponse:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        enrollments:
          type: array
          items:
            type: object
            properties:
              nodeId:
                type: string
              enrollmentId:
                type: string
              enrollmentCode:
                type: string
                description: One-time code (shown once)
      example:
        createdAt: "2025-12-17T10:15:00Z"
        expiresAt: "2025-12-17T10:45:00Z"
        enrollments:
          - nodeId: "node-001"
            enrollmentId: "enr_2f5c8c0b"
            enrollmentCode: "K4R9-3Q1Z-7P8M"
          - nodeId: "node-002"
            enrollmentId: "enr_8a0d1c77"
            enrollmentCode: "A1B2-C3D4-E5F6"

    CredentialsEnrollRequest:
      type: object
      required: [ nodeId, enrollmentCode, csrPem ]
      properties:
        nodeId:
          type: string
        enrollmentCode:
          type: string
        csrPem:
          type: string
          description: PKCS#10 CSR in PEM format
        deviceInfo:
          type: object
          additionalProperties: true

    CredentialsCertificateResponse:
      type: object
      required: [ nodeId, certificatePem, certificateChainPem, expiresAt ]
      properties:
        nodeId:
          type: string
        certificatePem:
          type: string
          description: Client certificate in PEM format
        certificateChainPem:
          type: string
          description: Certificate chain (including issuing CA) in PEM format
        expiresAt:
          type: string
          format: date-time
      example:
        nodeId: "node-001"
        certificatePem: |
          -----BEGIN CERTIFICATE-----
          MIIC...snip...AB
          -----END CERTIFICATE-----
        certificateChainPem: |
          -----BEGIN CERTIFICATE-----
          MIIC...snip...CA
          -----END CERTIFICATE-----
          -----BEGIN CERTIFICATE-----
          MIIC...snip...ROOT
          -----END CERTIFICATE-----
        expiresAt: "2026-12-17T10:15:00Z"

    CredentialsRenewRequest:
      type: object
      required: [ csrPem ]
      properties:
        csrPem:
          type: string
          description: PKCS#10 CSR in PEM format

    ProblemDetails:
      type: object
      additionalProperties: true
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: Machine-readable error type URI
        title:
          type: string
          description: Short, human-readable summary
        status:
          type: integer
          format: int32
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence
        errorCode:
          type: string
          description: Stable application error code
        correlationId:
          type: string
          description: Useful for tracing logs
        nodeId:
          type: string
        enrollmentId:
          type: string

  ###########################################################
  # Responses
  ###########################################################
  responses:
    BadRequest:
      description: Invalid request (e.g., missing/invalid `type` for submit/query, invalid content type).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
